version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Security (CVE) patches land as their own PR so their urgency is not
      # masked by routine churn (OVH-062). applies-to limits this group to
      # Dependabot security updates.
      security:
        applies-to: security-updates
        patterns:
          - "*"
      # Routine version bumps are batched into one weekly PR, separate from the
      # security group above.
      python:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      # pydantic-core is pinned transitively by pydantic. A standalone bump
      # breaks the hash-locked requirements under `pip install --require-hashes`.
      # Bump pydantic instead and relock with pip-compile.
      - dependency-name: "pydantic-core"
      # instructor (latest 1.15.4) caps jiter<0.15 and rich<15; litellm caps
      # importlib-metadata<9.0. These uninstallable ranges made every weekly
      # group PR internally inconsistent (#46/#50/#55). Range-scoped so
      # in-range (< cap) patch/security bumps still flow — only the impossible
      # versions are suppressed. Lift when instructor/litellm lift their caps.
      - dependency-name: "jiter"
        versions: [">=0.15.0"]
      - dependency-name: "rich"
        versions: [">=15.0.0"]
      - dependency-name: "importlib-metadata"
        versions: [">=9.0.0"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Batch all GitHub Actions bumps into one weekly PR.
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    # Bump the digest-pinned base image (Dockerfile) on a schedule so the OS /
    # Python base stays current, matching the pin-everything posture (OVH-061).
    groups:
      docker:
        patterns:
          - "*"
    # litellm (a core dep) currently caps Requires-Python <3.14, so a minor/major
    # base-image jump (e.g. 3.13 -> 3.14) fails the build. Take digest/patch bumps
    # only; lift this once litellm ships a >=3.14 release.
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
