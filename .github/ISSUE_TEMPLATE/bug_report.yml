name: Bug Report
description: Report a bug in Topic Watch
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below as completely as possible.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I'm on the latest release and have searched existing issues and discussions.
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: |
        What I did: ...
        What happened: ...
        What I expected: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running Topic Watch?
      options:
        - Docker
        - Docker Compose
        - Local (pip install)
        - Source checkout
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit hash (UI footer, or `python -m app.cli --version`). Please update to the latest release first to check it's not already fixed.
      placeholder: "e.g. 1.2.1 or b325d7a"
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Paste the output of `python -m app.cli doctor`
        (Docker: `docker compose exec topic-watch python -m app.cli doctor`).
        It is secret-safe — the API key shows as set/not set and notification URLs
        as scheme + count only. If you can't run it, note your OS, Python version,
        and how you installed Topic Watch.
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines here. Use `docker compose logs` or check your terminal output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or information that might help.
    validations:
      required: false
