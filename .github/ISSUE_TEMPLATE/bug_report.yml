name: Bug Report
description: Report a bug in Topic Watch
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: |
        What I did: ...
        What happened: ...
        What I expected: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running Topic Watch?
      options:
        - Docker
        - Local (pip install)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit hash (visible in the UI footer or via `git rev-parse --short HEAD`).
      placeholder: "e.g. 1.2.0 or b325d7a"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log lines here. Use `docker compose logs` or check your terminal output.
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: |
        Paste relevant sections of your `config.yml` here.
        **Redact API keys, passwords, and notification URLs before posting.**
      render: yaml
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or information that might help.
    validations:
      required: false
