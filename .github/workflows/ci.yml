name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install dependencies
        run: pip install --require-hashes -r requirements-dev.txt && pip install --no-deps -e .

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy app/ evals/ --ignore-missing-imports

      - name: Verify evals harness imports
        run: python -c "import evals"

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install --require-hashes -r requirements-dev.txt && pip install --no-deps -e .

      - name: Run tests
        run: pytest --tb=short
        env:
          TOPIC_WATCH_LLM__MODEL: "openai/gpt-4o-mini"
          TOPIC_WATCH_LLM__API_KEY: "test-key-not-real"

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build -t topic-watch:ci .

  security:
    # Dependency vulnerability scan (OVH-062). Hash-locked pins protect install
    # integrity but pin a vulnerable version as firmly as a safe one — this is
    # the gate that flags newly-disclosed CVEs in the litellm/lxml/trafilatura
    # tree that parses untrusted feed content. Non-blocking for now
    # (continue-on-error); promote to required once the baseline is clean.
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit runtime dependencies for known advisories
        run: pip-audit --requirement requirements.txt
