{% extends "base.html" %}
{% block title %}Add Topic - Topic Watch{% endblock %}
{% block content %}
<h1>Add Topic</h1>

{% if errors %}
<article aria-label="Validation errors">
    <header>Validation Errors</header>
    <ul>
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</article>
{% endif %}

<form method="post" action="/topics">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
    <label for="name">
        Topic Name
        <input type="text" id="name" name="name" required
               value="{{ name or '' }}"
               placeholder="e.g., Elden Ring DLC">
    </label>

    <label for="description">
        Description (what you care about)
        <input type="text" id="description" name="description" required
               value="{{ description or '' }}"
               placeholder="e.g., Release date, pricing, and new content">
        <small>Be specific. The AI only reports on aspects you describe here. "Release date and pricing" works better than "any news."</small>
    </label>

    <fieldset>
        <legend>Feed Source</legend>
        <label>
            <input type="radio" name="feed_mode" value="auto"
                   {{ 'checked' if (feed_mode or 'auto') == 'auto' }}
                   aria-controls="manual-feeds"
                   onchange="document.getElementById('manual-feeds').style.display='none'; document.getElementById('manual-feeds').setAttribute('aria-hidden','true')">
            Automatic (Google News)
        </label>
        <label>
            <input type="radio" name="feed_mode" value="manual"
                   {{ 'checked' if (feed_mode or 'auto') == 'manual' }}
                   aria-controls="manual-feeds"
                   onchange="document.getElementById('manual-feeds').style.display='block'; document.getElementById('manual-feeds').setAttribute('aria-hidden','false')">
            Manual (provide RSS URLs)
        </label>
    </fieldset>

    <div id="manual-feeds" aria-hidden="{{ 'false' if (feed_mode or 'auto') == 'manual' else 'true' }}" style="{{ 'display:block' if (feed_mode or 'auto') == 'manual' else 'display:none' }}">
        <label for="feed_urls">
            RSS Feed URLs (one per line)
            <textarea id="feed_urls" name="feed_urls" rows="4"
                      placeholder="https://example.com/feed.xml">{{ feed_urls or '' }}</textarea>
        </label>
        <button type="button"
                hx-post="/feeds/validate"
                hx-include="#feed_urls"
                hx-target="#feed-validation-results"
                hx-swap="innerHTML"
                class="secondary outline"
                style="margin-top: 0.5em;">
            Validate URLs
        </button>
        <div id="feed-validation-results"></div>
    </div>

    <label for="check_interval">
        Check Interval
        <input type="text" id="check_interval" name="check_interval"
               value="{{ check_interval or '' }}"
               placeholder="e.g., 6h, 1d, 2w, 1M, 1w 3d">
        <small>Leave empty to use the global default. Units: m (minutes), h (hours), d (days), w (weeks), M (months).</small>
    </label>

    <label for="tags">
        Tags (comma-separated)
        <input type="text" id="tags" name="tags"
               value="{{ tags or '' }}"
               placeholder="e.g., tech, ai, security">
        <small>Optional. Use tags to organize and filter topics.</small>
    </label>

    <button type="submit">Create Topic</button>
</form>
{% endblock %}
