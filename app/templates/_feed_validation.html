<div style="margin-top: 0.5em; display: flex; flex-direction: column; gap: 0.4em;">
{% for result in results %}
<div style="display: flex; align-items: baseline; gap: 0.5em;">
    {% if result.valid %}
    <span class="badge badge--ok">&#10004; OK</span>
    {% else %}
    <span class="badge badge--bad">&#10008; Failed</span>
    {% endif %}
    <small>
        {% if result.url %}<code>{{ result.url | truncate(60) }}</code> &mdash; {% endif %}
        {{ result.message }}
    </small>
</div>
{% endfor %}
</div>
